<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marina Stereo 99.8 FM</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* 🔥 AQUÍ VA TU BANNER */
    background: url('banner.jpg') no-repeat center center fixed;
    background-size: cover;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* TARJETA */
.card {
    background: rgba(0,0,0,0.65);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    color: white;
    backdrop-filter: blur(8px);
}

/* LOGO */
.logo {
    width: 170px;
    height: 170px;
    object-fit: contain;
    border-radius: 20px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    margin-bottom: 15px;
}

h1 {
    font-size: 20px;
    margin: 10px 0;
}

.location {
    font-size: 13px;
    opacity: 0.8;
}

/* EN VIVO */
.live {
    color: #00ff88;
    margin: 10px 0;
    font-size: 14px;
}

/* BOTONES */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
}

.play {
    background: #1db954;
    color: white;
}

.share {
    background: #1e90ff;
    color: white;
}

/* REDES */
.social {
    margin-top: 15px;
}

.social a img {
    width: 35px;
    margin: 5px;
}

audio {
    display: none;
}
</style>
</head>

<body>

<div class="card">

    <img src="logo.png" class="logo">

    <h1>Marina Stereo 99.8 FM</h1>
    <div class="location">Corozal - Colombia</div>

    <div class="live">🎵 En vivo</div>

    <button id="playBtn" class="btn play" onclick="toggleRadio()">
        ▶ Escuchar en vivo
    </button>

    <button class="btn share" onclick="shareRadio()">📲 Compartir emisora</button>

    <div class="social">

        <a href="https://wa.me/573114302957" target="_blank">
            <img src="Whatsapp.png">
        </a>

        <a href="https://www.instagram.com/marinastereo_arc/" target="_blank">
            <img src="instagram.png">
        </a>

        <a href="https://www.facebook.com/share/185JMgMCwJ/" target="_blank">
            <img src="facebook.png">
        </a>

    </div>

</div>

<audio id="radio">
    <source src="https://marina-corozal.wisemaradio.com/listen/marina-corozal/radio.mp3" type="audio/mpeg">
</audio>

<script>

let radio = document.getElementById("radio");
let btn = document.getElementById("playBtn");

function toggleRadio() {
    if (radio.paused) {
        radio.play();
        btn.innerHTML = "⏸ Pausar";
    } else {
        radio.pause();
        btn.innerHTML = "▶ Escuchar en vivo";
    }
}

function shareRadio() {
    if (navigator.share) {
        navigator.share({
            title: "Marina Stereo 99.8 FM",
            text: "Escucha nuestra emisora en vivo",
            url: window.location.href
        });
    } else {
        alert("Comparte este enlace: " + window.location.href);
    }
}

</script>

</body>
</html>
