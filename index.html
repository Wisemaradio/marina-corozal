<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marina Stereo 99.8 FM</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b3c7a, #001f3f);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* TARJETA */
.card {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    color: white;
    backdrop-filter: blur(10px);
}

/* LOGO */
.logo {
    width: 170px;
    height: 170px;
    object-fit: contain;
    border-radius: 20px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    margin-bottom: 15px;
}

h1 {
    font-size: 20px;
    margin: 10px 0;
}

.location {
    font-size: 13px;
    opacity: 0.8;
}

.live {
    color: #00ff88;
    margin: 10px 0;
    font-size: 14px;
    min-height: 20px;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
}

.play {
    background: #1db954;
    color: white;
}

.share {
    background: #1e90ff;
    color: white;
}

.social {
    margin-top: 15px;
}

.social a img {
    width: 35px;
    margin: 5px;
}

audio {
    display: none;
}
</style>
</head>

<body>

<div class="card">

    <!-- LOGO EMISORA -->
    <img src="logo.png" class="logo">

    <h1>Marina Stereo 99.8 FM</h1>
    <div class="location">Corozal - Colombia</div>

    <div class="live" id="live">🎵 En vivo</div>

    <button id="playBtn" class="btn play" onclick="toggleRadio()">
        ▶ Escuchar en vivo
    </button>

    <button class="btn share" onclick="shareRadio()">📲 Compartir emisora</button>

    <div class="social">

        <!-- ✅ WHATSAPP CORREGIDO -->
        <a href="https://wa.me/573114302957" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        </a>

        <a href="https://www.instagram.com/marinastereo_arc/" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
        </a>

        <a href="https://www.facebook.com/share/185JMgMCwJ/" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        </a>

    </div>

</div>

<audio id="radio">
    <source src="https://marina-corozal.wisemaradio.com/listen/marina-corozal/radio.mp3" type="audio/mpeg">
</audio>

<script>

let radio = document.getElementById("radio");
let btn = document.getElementById("playBtn");

function toggleRadio() {
    if (radio.paused) {
        radio.play();
        btn.innerHTML = "⏸ Pausar";
    } else {
        radio.pause();
        btn.innerHTML = "▶ Escuchar en vivo";
    }
}

/* 🔥 METADATA CORREGIDO (LIVE + AUTODJ) */

async function getMetadata() {
    try {
        let res = await fetch("https://marina-corozal.wisemaradio.com/api/nowplaying/marina-corozal");
        let data = await res.json();

        let song = "";

        // 🔥 SI ESTÁ EN VIVO (BUTT)
        if (data.live && data.live.is_live && data.live.now_playing.song.text) {
            song = data.live.now_playing.song.text;
        }
        // 🔁 SI ES AUTODJ
        else if (data.now_playing && data.now_playing.song.text) {
            song = data.now_playing.song.text;
        }

        if (song && song.trim() !== "") {
            document.getElementById("live").innerText = "🎶 " + song;
        } else {
            document.getElementById("live").innerText = "🎵 En vivo";
        }

    } catch {
        document.getElementById("live").innerText = "🎵 En vivo";
    }
}

setInterval(getMetadata, 10000);
getMetadata();

function shareRadio() {
    if (navigator.share) {
        navigator.share({
            title: "Marina Stereo 99.8 FM",
            text: "Escucha nuestra emisora en vivo",
            url: "https://marinacorozalplay.wisemaradio.com"
        });
    } else {
        alert("Comparte este enlace: https://marinacorozalplay.wisemaradio.com");
    }
}

</script>

</body>
</html>
